apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: telemetry-gateway
  namespace: monitoring
spec:
  mode: statefulset
  volumeClaimTemplates:
    - metadata:
        name: file-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
  volumeMounts:
    - name: file-storage
      mountPath: /var/lib/storage/otc
  image: "otel/opentelemetry-collector-contrib:0.154.0"
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP

  config:
    extensions:
      file_storage:
        directory: /var/lib/storage/otc
        timeout: 10s
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 75
        spike_limit_percentage: 15
      batch:
        send_batch_size: 1000
        timeout: 10s
      transform/sumo_metadata:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - set(resource.attributes["_sourceCategory"], Concat([resource.attributes["cluster"], resource.attributes["k8s.namespace.name"], resource.attributes["k8s.pod.name"]], "/"))
              - set(resource.attributes["_sourceName"], Concat([resource.attributes["k8s.namespace.name"], resource.attributes["k8s.pod.name"], resource.attributes["k8s.container.name"]], "."))
    exporters:
      debug: {}
      sumologic:
        endpoint: "https://collectors.au.sumologic.com/receiver/v1/otlp/<>"
        log_format: otlp
        sending_queue:
          enabled: true
          storage: file_storage
        retry_on_failure:
          enabled: true
    service:
      extensions: [file_storage]
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, transform/sumo_metadata, batch]
          exporters: [debug, sumologic]
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-gateway-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: telemetry-gateway-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      nodePort: 30431
      protocol: TCP
