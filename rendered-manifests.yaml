data:
  config.yaml: |
    exporters:
      sumologic:
        client: k8s_5.1.1
        endpoint: ${SUMO_ENDPOINT_DEFAULT_OTLP_LOGS_SOURCE}
        log_format: otlp
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 10000
          storage: file_storage
    extensions:
      file_storage:
        compaction:
          directory: /tmp
          on_rebound: true
        directory: /var/lib/storage/otc
        timeout: 10s
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
      pprof: {}
    processors:
      attributes/extract_systemd_source_fields:
        actions:
        - action: extract
          key: fluent.tag
          pattern: ^host\.(?P<_sourceName>[a-zA-z0-9]+)\..+$
        - action: insert
          from_attribute: _HOSTNAME
          key: _sourceHost
      attributes/remove_fluent_tag:
        actions:
        - action: delete
          key: fluent.tag
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
      filter/exclude_kubelet:
        logs:
          exclude:
            match_type: strict
            record_attributes:
            - key: _SYSTEMD_UNIT
              value: kubelet.service
      filter/exclude_kubelet_hostname:
        logs:
          exclude:
            match_type: regexp
            record_attributes:
            - key: _HOSTNAME
              value: $^
      filter/exclude_kubelet_priority:
        logs:
          exclude:
            match_type: regexp
            record_attributes:
            - key: PRIORITY
              value: $^
      filter/exclude_kubelet_syslog:
        logs:
          exclude:
            match_type: regexp
            record_attributes:
            - key: SYSLOG_FACILITY
              value: $^
      filter/exclude_kubelet_unit:
        logs:
          exclude:
            match_type: regexp
            record_attributes:
            - key: _SYSTEMD_UNIT
              value: $^
      filter/exclude_systemd_hostname:
        logs:
          exclude:
            match_type: regexp
            record_attributes:
            - key: _HOSTNAME
              value: $^
      filter/exclude_systemd_priority:
        logs:
          exclude:
            match_type: regexp
            record_attributes:
            - key: PRIORITY
              value: $^
      filter/exclude_systemd_syslog:
        logs:
          exclude:
            match_type: regexp
            record_attributes:
            - key: SYSLOG_FACILITY
              value: $^
      filter/exclude_systemd_unit:
        logs:
          exclude:
            match_type: regexp
            record_attributes:
            - key: _SYSTEMD_UNIT
              value: $^
      filter/include_containers:
        logs:
          include:
            match_type: regexp
            record_attributes:
            - key: k8s.container.name
              value: .+
      filter/include_fluent_tag_host:
        logs:
          include:
            match_type: regexp
            record_attributes:
            - key: fluent.tag
              value: host\..+
      filter/include_kubelet:
        logs:
          include:
            match_type: strict
            record_attributes:
            - key: _SYSTEMD_UNIT
              value: kubelet.service
      filter/include_systemd:
        logs:
          include:
            match_type: regexp
            record_attributes:
            - key: _SYSTEMD_UNIT
              value: .+
      groupbyattrs/containers:
        keys:
        - k8s.container.id
        - k8s.container.name
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.pod.uid
        - _collector
      groupbyattrs/systemd:
        keys:
        - _sourceName
        - _sourceHost
        - _collector
      k8sattributes:
        auth_type: serviceAccount
        extract:
          annotations:
          - from: pod
            key_regex: (.*)
            tag_name: pod_annotations_$$1
          - from: namespace
            key_regex: (.*)
            tag_name: namespace_annotations_$$1
          - from: node
            key_regex: (.*)
            tag_name: node_annotations_$$1
          labels:
          - from: pod
            key_regex: (.*)
            tag_name: pod_labels_$$1
          - from: namespace
            key_regex: (.*)
            tag_name: namespace_labels_$$1
          - from: node
            key_regex: (.*)
            tag_name: node_labels_$$1
          metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.pod.hostname
          - k8s.deployment.name
          - k8s.daemonset.name
          - k8s.replicaset.name
          - k8s.statefulset.name
          - k8s.namespace.name
          - k8s.node.name
          - service.name
          - service.namespace
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: resource_attribute
            name: k8s.namespace.name
          - from: resource_attribute
            name: k8s.pod.name
        wait_for_metadata: true
        wait_for_metadata_timeout: 10s
      memory_limiter:
        check_interval: 5s
        limit_percentage: 90
        spike_limit_percentage: 20
      resource/add_cluster:
        attributes:
        - action: upsert
          key: cluster
          value: kubernetes
      resource/containers_copy_node_to_host:
        attributes:
        - action: upsert
          from_attribute: k8s.node.name
          key: k8s.pod.hostname
      resource/drop_annotations:
        attributes:
        - action: delete
          pattern: ^pod_annotations_.*
        - action: delete
          pattern: ^namespace_annotations_.*
      resource/remove_pod_name:
        attributes:
        - action: delete
          key: pod_name
      resource/set_empty_source_metadata:
        attributes:
        - action: insert
          key: _sourceCategory
          value: ""
        - action: insert
          key: _sourceHost
          value: ""
        - action: insert
          key: _sourceName
          value: ""
      source/containers:
        annotation_prefix: pod_annotations_
        collector: kubernetes
        container_annotations:
          container_name_key: container
          enabled: false
          prefixes: []
        exclude:
          container: ""
          namespace: ""
          node: ""
          pod: ""
        namespace_annotation_prefix: namespace_annotations_
        pod_key: pod
        pod_name_key: pod_name
        pod_template_hash_key: pod_labels_pod-template-hash
        source_category: '%{namespace}/%{pod_name}'
        source_category_prefix: kubernetes/
        source_category_replace_dash: /
        source_host: ""
        source_name: '%{namespace}.%{pod}.%{container}'
      source/kubelet:
        collector: kubernetes
        source_category: kubelet
        source_category_prefix: kubernetes/
        source_category_replace_dash: /
        source_host: '%{_sourceHost}'
        source_name: k8s_kubelet
      source/systemd:
        collector: kubernetes
        source_category: system
        source_category_prefix: kubernetes/
        source_category_replace_dash: /
        source_host: '%{_sourceHost}'
        source_name: '%{_sourceName}'
      sumologic:
        add_cloud_namespace: false
      transform/add_timestamp:
        log_statements:
        - context: log
          statements:
          - set(time, Now()) where time_unix_nano == 0
          - set(attributes["timestamp"], Int(time_unix_nano / 1000000))
      transform/containers_parse_json:
        error_mode: ignore
        log_statements:
        - context: log
          statements:
          - set(body, ParseJSON(body)) where IsMatch(body, "^{")
      transform/flatten:
        error_mode: ignore
        log_statements:
        - context: log
