# Source: sumologic/templates/events/otelcol/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: release-name-sumologic-otelcol-events
  namespace: default
  labels:
    app: release-name-sumologic-otelcol-events
    chart: "sumologic-5.1.1"
    release: "release-name"
    heritage: "Helm"
data:
  config.yaml: |
    exporters:
      sumologic:
        client: k8s_5.1.1
        endpoint: ${SUMO_ENDPOINT_DEFAULT_OTLP_EVENTS_SOURCE}
        log_format: otlp
        sending_queue:
          enabled: true
          storage: file_storage
    extensions:
      file_storage:
        directory: /var/lib/storage/events
        timeout: 10s
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
      pprof: {}
    processors:
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
      filter/sumologic_configmaps:
        logs:
          include:
            match_type: regexp
            record_attributes:
            - key: chart
              value: ^sumologic.*
      resource/add_cluster:
        attributes:
        - action: upsert
          key: cluster
          value: kubernetes
      source:
        collector: kubernetes
        source_category: kubernetes/events
        source_category_prefix: ""
        source_category_replace_dash: /
        source_name: events
      sumologic:
        add_cloud_namespace: false
      transform/add_timestamp:
        log_statements:
        - context: log
          statements:
          - set(time, Now()) where time_unix_nano == 0
          - set(attributes["timestamp"], Int(time_unix_nano / 1000000))
      transform/extract_configmap_name:
        log_statements:
        - context: log
          statements:
          - set(attributes["configmap_name"], body["metadata"]["name"]) where body["metadata"]["name"]
            != nil
          - set(attributes["chart"], body["metadata"]["labels"]["chart"]) where body["metadata"]["labels"]["chart"]
            != nil
    receivers:
      k8sobjects/configmaps:
        auth_type: serviceAccount
        objects:
        - interval: 24h
          mode: pull
          name: configmaps
          namespaces:
          - default
      raw_k8s_events: {}
    service:
      extensions:
      - health_check
      - file_storage
      - pprof
      pipelines:
        logs/configmaps:
          exporters:
          - sumologic
          processors:
          - transform/extract_configmap_name
          - filter/sumologic_configmaps
          - resource/add_cluster
          - source
          - sumologic
          - transform/add_timestamp
          - batch
          receivers:
          - k8sobjects/configmaps
        logs/events:
          exporters:
          - sumologic
          processors:
          - resource/add_cluster
          - source
          - sumologic
          - transform/add_timestamp
          - batch
          receivers:
          - raw_k8s_events
      telemetry:
        logs:
          level: info
        metrics:
          level: normal
          readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
                  without_scope_info: true
                  without_type_suffix: true
                  without_units: true


---
# Source: sumologic/templates/instrumentation/otelcol-instrumentation/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: release-name-sumologic-otelcol-instrumentation
  namespace: default
  labels:
    app: release-name-sumologic-otelcol-instrumentation
    chart: "sumologic-5.1.1"
    release: "release-name"
    heritage: "Helm"
data:
  otelcol.instrumentation.conf.yaml: |
    exporters:
      otlphttp/traces:
        endpoint: http://release-name-sumologic-traces-gateway.default:4318
      sumologic/metrics:
        client: k8s_5.1.1
        compression: gzip
        endpoint: ${SUMO_ENDPOINT_DEFAULT_METRICS_SOURCE}
        log_format: text
        max_request_body_size: 1048576
        metric_format: prometheus
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_elapsed_time: 120s
          max_interval: 30s
        sending_queue:
          enabled: false
          num_consumers: 10
          queue_size: 5000
        timeout: 5s
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
      pprof: {}
    processors:
      batch:
        send_batch_max_size: 512
        send_batch_size: 256
        timeout: 5s
      k8sattributes:
        auth_type: serviceAccount
        extract:
          annotations:
          - from: pod
            key_regex: (.*)
            tag_name: k8s.pod.annotation.$$1
          labels:
          - from: pod
            key_regex: (.*)
            tag_name: k8s.pod.label.$$1
          - from: namespace
            key_regex: (.*)
            tag_name: k8s.namespace.label.$$1
          metadata:
          - k8s.pod.name
          - k8s.pod.uid
          - k8s.deployment.name
          - k8s.daemonset.name
          - k8s.replicaset.name
          - k8s.statefulset.name
          - k8s.namespace.name
          - k8s.node.name
          - k8s.container.name
          - service.name
          - service.namespace
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.uid
        - sources:
          - from: resource_attribute
            name: k8s.pod.ip
        - sources:
          - from: resource_attribute
            name: ip
        - sources:
          - from: connection
        wait_for_metadata: true
        wait_for_metadata_timeout: 10s
      memory_limiter:
        check_interval: 5s
        limit_percentage: 90
        spike_limit_percentage: 20
      resource:
        attributes:
        - action: upsert
          key: k8s.cluster.name
          value: kubernetes
      resourcedetection:
        detectors:
        - system
        override: false
        timeout: 10s
      source:
        annotation_prefix: k8s.pod.annotation.
        collector: kubernetes
        exclude:
          k8s.container.name: ""
          k8s.host.name: ""
          k8s.namespace.name: ""
          k8s.pod.name: ""
        pod_key: k8s.pod.name
        pod_name_key: k8s.pod.pod_name
        pod_template_hash_key: k8s.pod.label.pod-template-hash
        source_category: '%{k8s.namespace.name}/%{k8s.pod.pod_name}'
        source_category_prefix: kubernetes/
        source_category_replace_dash: /
        source_host: '%{k8s.pod.hostname}'
        source_name: '%{k8s.namespace.name}.%{k8s.pod.pod_name}.%{k8s.container.name}'
    receivers:
      jaeger:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:14250
          thrift_binary:
            endpoint: ${env:MY_POD_IP}:6832
          thrift_compact:
            endpoint: ${env:MY_POD_IP}:6831
          thrift_http:
            endpoint: ${env:MY_POD_IP}:14268
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
      otlp/deprecated:
        protocols:
          http:
            endpoint: ${env:MY_POD_IP}:55681
      zipkin:
        endpoint: ${env:MY_POD_IP}:9411
    service:
      extensions:
      - health_check
      - pprof
      pipelines:
        metrics:
          exporters:
          - sumologic/metrics
          processors:
          - memory_limiter
          - k8sattributes
          - source
          - resource
          - batch
          receivers:
          - otlp
          - otlp/deprecated
        traces:
          exporters:
          - otlphttp/traces
          processors:
          - memory_limiter
          - k8sattributes
          - source
          - resource
          - batch
          receivers:
          - jaeger
          - otlp
          - otlp/deprecated
          - zipkin
      telemetry:
        logs:
          level: info
        metrics:
          level: normal
          readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
                  without_scope_info: true
                  without_type_suffix: true
                  without_units: true

