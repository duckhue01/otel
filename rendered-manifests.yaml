# Source: sumologic/templates/metrics/otelcol/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: release-name-sumologic-otelcol-metrics
  namespace: default
  labels:
    app: release-name-sumologic-otelcol-metrics
    chart: "sumologic-5.1.1"
    release: "release-name"
    heritage: "Helm"
data:
  config.yaml: |
    exporters:
      sumologic/default:
        client: k8s_5.1.1
        decompose_otlp_histograms: true
        decompose_otlp_summaries: true
        endpoint: ${SUMO_ENDPOINT_DEFAULT_OTLP_METRICS_SOURCE}
        max_request_body_size: 16777216
        metric_format: otlp
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 10000
          storage: file_storage
        timeout: 30s
    extensions:
      file_storage:
        compaction:
          directory: /tmp
          on_rebound: true
        directory: /var/lib/storage/otc
        timeout: 10s
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
      pprof: {}
    processors:
      batch:
        send_batch_max_size: 2048
        send_batch_size: 1024
        timeout: 1s
      filter/drop_unnecessary_metrics:
        error_mode: ignore
        metrics:
          metric:
          - resource.attributes["job"] != "pod-annotations" and IsMatch(name, "scrape_.*")
          - (not IsMatch(name, "^$")) and (type == METRIC_DATA_TYPE_HISTOGRAM or type
            == METRIC_DATA_TYPE_EXPONENTIAL_HISTOGRAM or type == METRIC_DATA_TYPE_SUMMARY
            or IsMatch(name, ".*_bucket"))
          - IsMatch(name, "^otelcol[._](k8s[._]pod[._]association|otelsvc_k8s_(pod_added|pod_updated|pod_table_size|pod_deleted|ip_lookup_miss))$")
          - IsMatch(name, "^otelcol[._].*k8s.*")
      groupbyattrs:
        keys:
        - container
        - namespace
        - pod
        - service
      groupbyattrs/group_by_name:
        keys:
        - __name__
        - job
      k8sattributes:
        auth_type: serviceAccount
        extract:
          labels:
          - from: pod
            key_regex: (.*)
            tag_name: pod_labels_$$1
          metadata:
          - k8s.pod.name
          - k8s.deployment.name
          - k8s.daemonset.name
          - k8s.replicaset.name
          - k8s.statefulset.name
          - k8s.namespace.name
          - k8s.node.name
          - service.name
          - service.namespace
        passthrough: false
        pod_association:
        - sources:
          - from: resource_attribute
            name: k8s.pod.name
          - from: resource_attribute
            name: k8s.namespace.name
        wait_for_metadata: true
        wait_for_metadata_timeout: 10s
      memory_limiter:
        check_interval: 5s
        limit_percentage: 90
        spike_limit_percentage: 20
      metricstransform:
        transforms:
        - action: update
          include: ^prometheus_remote_write_(.*)$$
          match_type: regexp
          new_name: $$1
      resource:
        attributes:
        - action: upsert
          from_attribute: namespace
          key: k8s.namespace.name
        - action: delete
          key: namespace
        - action: upsert
          from_attribute: pod
          key: k8s.pod.name
        - action: delete
          key: pod
        - action: upsert
          from_attribute: container
          key: k8s.container.name
        - action: delete
          key: container
        - action: upsert
          from_attribute: node
          key: k8s.node.name
        - action: delete
          key: node
        - action: upsert
          from_attribute: service
          key: prometheus_service
        - action: delete
          key: service
        - action: upsert
          from_attribute: service.name
          key: job
        - action: delete
          key: service.name
        - action: upsert
          key: _origin
          value: kubernetes
        - action: upsert
          key: cluster
          value: kubernetes
      resource/delete_source_metadata:
        attributes:
        - action: delete
          key: _sourceCategory
        - action: delete
          key: _sourceHost
        - action: delete
          key: _sourceName
      resource/remove_k8s_pod_pod_name:
        attributes:
        - action: delete
          key: k8s.pod.pod_name
      source:
        collector: kubernetes
        exclude:
          k8s.namespace.name: ""
      sumologic:
        add_cloud_namespace: false
      transform/remove_name:
        error_mode: ignore
        metric_statements:
        - context: resource
          statements:
          - delete_key(attributes, "__name__")
      transform/set_name:
        error_mode: ignore
        metric_statements:
        - context: datapoint
          statements:
          - set(attributes["__name__"], metric.name) where IsMatch(metric.name, "^cloudprovider_.*")
    receivers:
      otlp:
        protocols:
          http:
            endpoint: ${env:MY_POD_IP}:4318
      prometheusremotewrite:
        endpoint: ${env:MY_POD_IP}:9888
        read_timeout: 1m
        write_timeout: 1m
    service:
      extensions:
      - health_check
      - file_storage
      - pprof
      pipelines:
        metrics:
          exporters:
          - sumologic/default
          processors:
          - memory_limiter
          - metricstransform
          - groupbyattrs
          - resource
          - k8sattributes
          - source
          - sumologic
          - resource/remove_k8s_pod_pod_name
          - resource/delete_source_metadata
          - transform/set_name
          - groupbyattrs/group_by_name
          - transform/remove_name
          - filter/drop_unnecessary_metrics
          - batch
          receivers:
          - prometheusremotewrite
          - otlp
      telemetry:
        logs:
          level: info
        metrics:
          level: normal
          readers:
          - pull:
              exporter:
                prometheus:
                  host: ${env:MY_POD_IP}
                  port: 8888
                  without_scope_info: true
                  without_type_suffix: true
                  without_units: true

